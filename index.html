<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chowking Attendance Summary | Cosmic Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: {
                            950: '#030712',
                            900: '#0b0f19',
                            800: '#111827',
                            700: '#1f2937',
                            400: '#9ca3af'
                        },
                        cyan: { 400: '#22d3ee', 500: '#06b6d4' }
                    }

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            /* High-resolution dark space nebula background */
            background-image: linear-gradient(to bottom, rgba(3, 7, 18, 0.85), rgba(11, 15, 25, 0.92)), 
                              url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f3f4f6;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        .loader { border-top-color: #22d3ee; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* Custom Cosmic Scrollbar */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.01); }
        ::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(34, 211, 238, 0.4); }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(1) saturate(5) hue-rotate(140deg);
            cursor: pointer;
        }
        /* Frosted Deep Space Glassmorphism */
        .glass-card {
            background: rgba(11, 15, 25, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .table-header-text {
            color: #22d3ee;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.85;
        }
        .glass-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 5px 14px;
            border-radius: 9999px;
            border: 1px solid transparent;
        }
        .badge-emerald { background: rgba(16, 185, 129, 0.12); color: #34d399; border-color: rgba(16, 185, 129, 0.25); text-shadow: 0 0 8px rgba(52, 211, 153, 0.3); }
        .badge-amber { background: rgba(245, 158, 11, 0.12); color: #fbbf24; border-color: rgba(245, 158, 11, 0.25); text-shadow: 0 0 8px rgba(251, 191, 36, 0.3); }
        .badge-rose { background: rgba(244, 63, 94, 0.12); color: #fb7185; border-color: rgba(244, 63, 94, 0.25); text-shadow: 0 0 8px rgba(251, 113, 133, 0.3); }
        .badge-cyan { background: rgba(34, 211, 238, 0.12); color: #22d3ee; border-color: rgba(34, 211, 238, 0.25); text-shadow: 0 0 8px rgba(34, 211, 238, 0.3); }

        /* Shooting Stars Background Effect */
        .shooting-stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .star {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1), 0 0 0 8px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 1);
            animation: animate 3s linear infinite;
        }
        .star::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
        }
        @keyframes animate {
            0% { transform: rotate(315deg) translateX(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
        }
        .star:nth-child(1) { top: 0; right: 0; left: initial; animation-delay: 0s; animation-duration: 1s; }
        .star:nth-child(2) { top: 0; right: 80px; left: initial; animation-delay: 0.2s; animation-duration: 3s; }
        .star:nth-child(3) { top: 80px; right: 0px; left: initial; animation-delay: 0.4s; animation-duration: 2s; }
        .star:nth-child(4) { top: 0; right: 180px; left: initial; animation-delay: 0.6s; animation-duration: 1.5s; }
        .star:nth-child(5) { top: 0; right: 400px; left: initial; animation-delay: 0.8s; animation-duration: 2.5s; }
        .star:nth-child(6) { top: 0; right: 600px; left: initial; animation-delay: 1s; animation-duration: 3s; }
        .star:nth-child(7) { top: 300px; right: 0px; left: initial; animation-delay: 1.2s; animation-duration: 1.75s; }
        .star:nth-child(8) { top: 0px; right: 700px; left: initial; animation-delay: 1.4s; animation-duration: 1.25s; }
        .star:nth-child(9) { top: 0px; right: 1000px; left: initial; animation-delay: 0.75s; animation-duration: 2.25s; }
        .star:nth-child(10) { top: 0px; right: 450px; left: initial; animation-delay: 2.75s; animation-duration: 2.25s; }
    </style>
</head>

<script>
    const SUPABASE_URL = 'https://uhmjgnwpzsemksxcjpiz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVobWpnbndwenNlbWtzeGNqcGl6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODMyNDU2NCwiZXhwIjoyMDkzOTAwNTY0fQ.SVdNjQlocvBEwwxl2K_7BMT94vUq5fkNRev65fXrvyc';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const AUTH_PASS = 'fusion2026';
    const MEDAL_PASS = 'medal2026';
    let employees = [];
    let activeTab = 'attendance';
    let portalRole = 'admin'; // 'admin' or 'medal'
    let currentAttendance = [];
    let allAttendance = [];
    let allDaRecords = [];
    let allAttritionRecords = [];
    let currentNote = null;
    let showExcrew = false;
    let medalCountdownStart = null;

    function toggleExcrew() {
        showExcrew = !showExcrew;
        const btn = document.getElementById('btn-excrew-filter');
        if (showExcrew) {
            btn.classList.remove('text-space-400');
            btn.classList.add('bg-rose-500/20', 'text-rose-400', 'border-rose-500/30');
        } else {
            btn.classList.add('text-space-400');
            btn.classList.remove('bg-rose-500/20', 'text-rose-400', 'border-rose-500/30');
        }
        renderMain();
    }

    function selectDAEmployee(name) {
        document.getElementById('da-name-select').value = name;
        renderMain();
    }

    function togglePassword() {
        const passInput = document.getElementById('sys-pass');
        const icon = document.getElementById('toggle-icon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function checkAuth() {
        const pass = document.getElementById('sys-pass').value;
        const error = document.getElementById('auth-error');
        const loginSection = document.getElementById('login-container');
        const portalSection = document.getElementById('portal-container');
        const body = document.body;

        if (pass === AUTH_PASS || pass === MEDAL_PASS) {
            const role = pass === AUTH_PASS ? 'admin' : 'medal';
            sessionStorage.setItem('portal_auth', 'true');
            sessionStorage.setItem('portal_role', role);
            portalRole = role;

            loginSection.classList.add('hidden');
            portalSection.classList.remove('hidden');
            body.classList.remove('items-center', 'justify-center');
            body.classList.add('p-4', 'md:p-12');

            if (role === 'medal') {
                activeTab = 'medals';
            }

            initializeData();
        } else {
            error.classList.remove('hidden');
            document.getElementById('sys-pass').value = '';
            document.getElementById('sys-pass').focus();
        }
    }

    function logout() {
        sessionStorage.removeItem('portal_auth');
        sessionStorage.removeItem('portal_role');
        location.reload();
    }

    window.onload = async () => {
        if (sessionStorage.getItem('portal_auth') === 'true') {
            portalRole = sessionStorage.getItem('portal_role') || 'admin';
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('portal-container').classList.remove('hidden');
            document.body.classList.remove('items-center', 'justify-center');
            if (portalRole === 'medal') activeTab = 'medals';
            initializeData();
        }
    };

    async function initializeData() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-picker').value = today;

        const { data } = await sb.from('employees').select('*');
        if (data) employees = data;

        const { data: attendanceData } = await sb.from('attendance_records').select('*');
        if (attendanceData) allAttendance = attendanceData;

        const { data: daData } = await sb.from('da_records').select('*').order('date_report', { ascending: false });
        if (daData) {
            allDaRecords = daData;
            const select = document.getElementById('da-name-select');
            const uniqueNames = [...new Set(daData.map(r => r.employee_name))].sort();
            uniqueNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                select.appendChild(opt);
            });
        }

        const { data: attrData } = await sb.from('attrition_records').select('*').order('last_day_of_duty', { ascending: false });
        if (attrData) allAttritionRecords = attrData;

        // Fetch Medal Countdown Start from settings
        const { data: settingsData } = await sb.from('settings').select('value').eq('key', 'medal_countdown_start').maybeSingle();
        if (settingsData) medalCountdownStart = settingsData.value;

        fetchSummary(today);
    }

    function switchTab(tab) {
        activeTab = tab;
        const btnAtt = document.getElementById('btn-attendance');
        const btnEmp = document.getElementById('btn-employees');
        const btnDa = document.getElementById('btn-da');
        const btnAttr = document.getElementById('btn-attrition');
        const btnMedal = document.getElementById('btn-medals');
        const datePicker = document.getElementById('date-picker');
        const daFilter = document.getElementById('da-filter-container');
        const excrewBtn = document.getElementById('btn-excrew-filter');

        [btnAtt, btnEmp, btnDa, btnAttr, btnMedal].forEach(btn => {
            if (!btn) return;
            btn.className = "flex-1 px-6 md:px-8 py-3 rounded-xl text-[10px] md:text-[11px] font-black uppercase tracking-widest transition-all text-space-400 hover:text-white whitespace-nowrap";
        });

    async function fetchSummary(date) {
        const listContainer = document.getElementById('attendance-list');
        listContainer.innerHTML = '<div class="p-32 text-center"><div class="loader ease-linear rounded-full border-4 border-t-4 border-space-800 h-12 w-12 mx-auto mb-6"></div></div>';

        try {
            const { data: records, error: recError } = await sb.from('attendance_records').select('*').eq('date', date);
            const { data: noteData } = await sb.from('daily_summary_notes').select('note').eq('date', date).maybeSingle();

            if (recError) throw recError;
            currentAttendance = records || [];
            currentNote = noteData ? noteData.note : null;
            renderMain();
        } catch (err) {
            console.error("Terminal Sync Fault:", err);
            listContainer.innerHTML = `<div class="p-32 text-center text-rose-400 font-bold uppercase text-xs tracking-widest">Uplink Interrupted.<br><span class="text-[10px] lowercase italic opacity-60">${err.message || err}</span></div>`;
        }
    }

    function renderMedals(container) {
        const startDate = medalCountdownStart ? new Date(medalCountdownStart) : new Date();
        if (!medalCountdownStart) startDate.setDate(startDate.getDate() - 30);

        const endDate = new Date(startDate);
        endDate.setDate(endDate.getDate() + 30);

        if (portalRole === 'medal') {
            document.getElementById('sub-title').innerText = `${startDate.toDateString()} — ${endDate.toDateString()}`;
            document.getElementById('sub-title').classList.add('text-cyan-400');
            document.getElementById('sub-title').classList.remove('text-space-400');
        }

        const medalMap = {};

        allAttendance.forEach(r => {
            const d = new Date(r.date);
            if (d >= startDate && d < endDate && (r.status === 'LATE' || r.status === 'OVERBREAK')) {
                if (!medalMap[r.employee_id]) medalMap[r.employee_id] = { gold: 0, silver: 0 };
                const note = r.note || "";
                const match = note.match(/\((\d+)\s*mins\)/);
                if (match) {
                    const mins = parseInt(match[1]);
                    if (mins >= 5) medalMap[r.employee_id].gold++; else medalMap[r.employee_id].silver++;
                } else {
                    medalMap[r.employee_id].gold++;

        const excludedPositions = ["Manager", "Assistant Manager", "Excrew", "Coordinator", "Senior Crew", "Administrator"];

                    <tbody class="divide-y divide-white/5">`;

        const positionOrder = ["team leader", "cashier", "dispatch", "ss", "cic", "assembler", "fryer", "noodle", "dj", "backup"];

        const grouped = medalEmps.reduce((acc, emp) => {
            const pos = (emp.position || "Crew");
            if (!acc[pos]) acc[pos] = [];
            acc[pos].push(emp);
            return acc;
        }, {});

        // Sort positions based on positionOrder
        const sortedPositions = Object.keys(grouped).sort((a, b) => {
            const indexA = positionOrder.indexOf(a.toLowerCase());
            const indexB = positionOrder.indexOf(b.toLowerCase());

    function renderDA(container, dataToRender) {
        if (dataToRender.length === 0) {
            container.innerHTML = `<div class="p-32 text-center text-space-400 font-bold text-xs uppercase tracking-widest opacity-50">No warning flags logged inside archive.</div>`;
            return;
        }

        let html = `
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-space-900/60 border-b border-white/10">
                            <th class="px-10 py-5 table-header-text w-1/4">Employee Name</th>
                            <th class="px-10 py-5 table-header-text w-1/4">Disciplinary Action</th>
                            <th class="px-10 py-5 table-header-text w-1/6">Report Status</th>
                            <th class="px-10 py-5 table-header-text">Notes</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5">
        `;

        dataToRender.forEach(rec => {
            const isForReporting = !rec.date_report;
            html += `
                <tr class="hover:bg-cyan-500/[0.02] transition-colors">
                    <td class="px-10 py-5 font-bold text-slate-100 text-sm tracking-tight ${isForReporting ? 'cursor-pointer select-none' : ''}"
                        ${isForReporting ? `ondblclick="selectDAEmployee('${rec.employee_name}')" title="Double-click to filter"` : ''}>
                        ${rec.employee_name}
                    </td>
                    <td class="px-10 py-5">
                        <p class="text-xs text-rose-400 font-bold uppercase tracking-wider">${rec.da_type}</p>
                        <p class="text-[10px] text-space-500 mt-0.5 uppercase font-medium">Date Happen: ${rec.date_awol || '--'}</p>
                    </td>
                    <td class="px-10 py-5">
                        <span class="glass-badge badge-emerald">${rec.status}</span>
                        <p class="text-[10px] text-space-500 mt-1 uppercase font-medium">${rec.date_report ? 'Report: ' + rec.date_report : 'For Reporting'}</p>
                    </td>
                    <td class="px-10 py-5 max-w-[400px]">
                        <p class="text-xs text-slate-300 italic border-l border-cyan-500/30 pl-4 bg-cyan-500/[0.01] py-2 rounded-r-lg">"${rec.verdict || 'Processing incident variables...'}"</p>
                    </td>
                </tr>
            `;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function renderAttrition(container, dataToRender) {
        if (dataToRender.length === 0) {
            container.innerHTML = `<div class="p-32 text-center text-space-400 font-bold text-xs uppercase tracking-widest opacity-50">No crew detachment sequences registered.</div>`;
            return;
        }

        let html = `
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-space-900/60 border-b border-white/10">
                            <th class="px-10 py-5 table-header-text w-1/4">Detached Personnel</th>
                            <th class="px-10 py-5 table-header-text w-1/5">Former System Role</th>
                            <th class="px-10 py-5 table-header-text w-1/5">Cycle Range Timeline</th>
                            <th class="px-10 py-5 table-header-text">Official Separation Assessment</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5">
        `;

        dataToRender.forEach(rec => {
            html += `
                <tr class="hover:bg-cyan-500/[0.02] transition-colors">
                    <td class="px-10 py-5 font-bold text-slate-100 text-sm tracking-tight">${rec.first_name} ${rec.last_name}</td>
                    <td class="px-10 py-5 uppercase font-black text-[10px] text-space-400 tracking-wider">${rec.position}</td>
                    <td class="px-10 py-5">
                        <p class="text-xs text-rose-400 font-semibold">Last Day: ${rec.last_day_of_duty}</p>
                        <p class="text-[10px] text-space-500 mt-0.5">Deployed: ${rec.date_hired || '--'}</p>
                    </td>
                    <td class="px-10 py-5 max-w-[400px]">
                        <p class="text-xs text-slate-300 italic border-l border-rose-500/30 pl-4 bg-rose-500/[0.01] py-2 rounded-r-lg">"${rec.reason_for_separation}"</p>
                    </td>
                </tr>
            `;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }
</script>
</body>
</html>
